version: '3.8'

services:
  app:
    build: .
    container_name: okazx_app
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Override the DB_URL from .env to connect to the db service inside the docker network
      - DB_URL=jdbc:postgresql://db:5432/okazx
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: okazx
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: